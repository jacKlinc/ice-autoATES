name: CI

on: [ push ]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv run --group dev pytest unit--cov=ates --cov-report=term-missing
  integration-test:
    uses: ./.github/workflows/integration.yml
  e2e-test:
    uses: ./.github/workflows/e2e.yml

# TODO: add linting when in next PR
